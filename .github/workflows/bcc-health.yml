name: BNE Pulse - BCC API Health Check

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build Next.js app
        run: npm run build

      - name: Debug - Check BCC API access
        run: |
          echo "Testing Parking API..."
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Apikey ${{ secrets.BCC_API_KEY }}" \
            "https://data.brisbane.qld.gov.au/api/explore/v2.1/catalog/datasets/brisbane-parking-stations/records?limit=1"

          echo "Testing Events API..."
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Apikey ${{ secrets.BCC_API_KEY }}" \
            "https://data.brisbane.qld.gov.au/api/explore/v2.1/catalog/datasets/brisbane-city-council-events/records?limit=1"

      - name: Run health checks
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000
          BCC_API_KEY: ${{ secrets.BCC_API_KEY }}

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
